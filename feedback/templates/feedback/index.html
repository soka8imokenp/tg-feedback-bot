{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:,">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ad88b9; --dark-bg: #0c0a14; }
        
        body { 
            background-color: var(--dark-bg);
            font-family: 'Unbounded', sans-serif;
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }

        .neo-card {
            position: relative;
            background-image: url("{% static 'feedback/kawaii.png' %}");
            background-size: cover;
            background-position: center;
            border: 2px solid #000000;
            box-shadow: 8px 8px 0px #000000;
            border-radius: 32px;
            overflow: hidden;
        }

        .neo-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(0px); /* Блюр убран */
            z-index: 0;
        }

        .neo-card-content {
            position: relative;
            z-index: 1;
        }

        /* Стиль для логотипа - цвет круга изменен на белый */
        .neo-avatar {
            /* Убедись, что путь к файлу верный, например static/feedback/logo.png */
            background-image: url("{% static 'feedback/logo.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: white; /* Цвет фона изменен на белый */
        }

        .neo-input {
            border: 2px solid #000000;
            border-radius: 20px;
            background: rgba(248, 249, 250, 0.9);
        }

        .neo-btn {
            background-color: var(--accent);
            border: 2px solid #000000;
            box-shadow: 4px 4px 0px #000000;
            border-radius: 22px;
            color: white;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .neo-btn:active { box-shadow: 0px 0px 0px #000000; transform: translate(2px, 2px); }
        .neo-btn:disabled { opacity: 0.7; pointer-events: none; }

        .custom-select-wrapper { position: relative; cursor: pointer; }
        .custom-select-trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem; font-weight: 700; font-size: 0.875rem; color: black;
        }
        .custom-options {
            position: absolute; top: calc(100% + 8px); left: 0; right: 0;
            background: white; border: 2px solid #000000; border-radius: 20px;
            box-shadow: 6px 6px 0px #000000; z-index: 50;
            display: none; overflow: hidden;
        }
        .custom-options.show { display: block; animation: selectFadeIn 0.2s ease-out; }
        .custom-option {
            padding: 12px 20px; font-size: 0.75rem; font-weight: 700; color: #666;
            transition: all 0.2s; border-bottom: 1px solid #eee;
        }
        .custom-option:last-child { border-bottom: none; }
        .custom-option:hover { background: #f0f0f0; color: var(--accent); }
        
        @keyframes selectFadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .indicator-loading { display: none; }
        .htmx-request .indicator-default { display: none; }
        .htmx-request .indicator-loading { display: flex; }
    </style>
</head>
<body class="p-4">
    <div id="form-container" class="w-full max-w-md mx-auto">
        <div class="neo-card p-8">
            <div class="neo-card-content">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-2xl font-bold text-black tracking-tight uppercase">Kawaii</h1>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[3px]">Service Support</p>
                    </div>
                    <div class="w-10 h-10 rounded-full border-2 border-black neo-avatar shadow-[3px_3px_0px_#000000]"></div>
                </div>
                
                <form id="feedback-form" hx-post="{% url 'submit_feedback' %}" hx-target="#form-container" class="space-y-6">
                    {% csrf_token %}
                    <input type="hidden" name="user_id" id="user_id">
                    <input type="hidden" name="username" id="username">
                    <input type="hidden" name="category" id="category_input" value="news">

                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold ml-2 text-gray-400 uppercase tracking-widest">Kategoriya</label>
                        <div class="custom-select-wrapper neo-input" id="custom-select">
                            <div class="custom-select-trigger">
                                <span id="selected-text">Yangilik yuborish</span>
                                <svg class="w-4 h-4 transition-transform duration-300" id="select-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </div>
                            <div class="custom-options" id="select-options">
                                <div class="custom-option" data-value="news">Yangilik yuborish</div>
                                <div class="custom-option" data-value="ads">Reklama joylashtirish</div>
                                <div class="custom-option" data-value="report">Shikoyat qilish</div>
                                <div class="custom-option" data-value="collab">Hamkorlik</div>
                                <div class="custom-option" data-value="other">Boshqa</div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold ml-2 text-gray-400 uppercase tracking-widest">Xabar matni</label>
                        <textarea name="text" placeholder="Fikringizni yozing..." required 
                            class="neo-input w-full p-4 bg-gray-50/50 text-black h-36 resize-none focus:ring-0 text-sm font-bold"></textarea>
                    </div>

                    <button type="submit" class="neo-btn w-full py-5 font-bold text-sm flex items-center justify-center">
                        <span class="indicator-default">Yuborish</span>
                        <div class="indicator-loading items-center space-x-2">
                            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span>Yuborilmoqda...</span>
                        </div>
                    </button>
                </form>
            </div>
        </div>
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#0c0a14');

        const selectWrapper = document.getElementById('custom-select');
        const optionsList = document.getElementById('select-options');
        const selectedText = document.getElementById('selected-text');
        const categoryInput = document.getElementById('category_input');
        const arrow = document.getElementById('select-arrow');

        selectWrapper.addEventListener('click', (e) => {
            optionsList.classList.toggle('show');
            arrow.style.transform = optionsList.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
        });

        document.querySelectorAll('.custom-option').forEach(option => {
            option.addEventListener('click', (e) => {
                const val = e.target.getAttribute('data-value');
                const text = e.target.innerText;
                selectedText.innerText = text;
                categoryInput.value = val;
                optionsList.classList.remove('show');
                arrow.style.transform = 'rotate(0deg)';
                e.stopPropagation();
            });
        });

        window.addEventListener('click', (e) => {
            if (!selectWrapper.contains(e.target)) {
                optionsList.classList.remove('show');
                arrow.style.transform = 'rotate(0deg)';
            }
        });

        function fillData() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('user_id').value = user.id || "";
                document.getElementById('username').value = user.username || "anonymous";
            }
        }
        fillData();
        document.body.addEventListener('htmx:configRequest', (event) => { 
            fillData();
            document.querySelector('.neo-btn').disabled = true;
        });
    </script>
</body>
</html>
