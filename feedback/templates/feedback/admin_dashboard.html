{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&display=swap" rel="stylesheet">
    <title>Soft Retro Admin</title>
    <style>
        * { box-sizing: border-box; }

        :root {
            --bg-main: #F4F9FF;       
            --accent-blue: #82B3FB;   
            --ultramarine: #120AFF;   
            --accent-light: #FFFFFF;  
            --dark: #1A1A1B;          
        }

        body {
            font-family: 'Unbounded', sans-serif;
            background-color: var(--bg-main);
            background-image: url("{% static 'feedback/admin_wall.png' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--dark);
            margin: 0;
            padding: 12px;
            letter-spacing: -0.02em;
            width: 100vw;
            max-width: 100%;
            overflow-x: hidden;
        }

        /* --- ПРЕЛОАДЕР --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-main); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loader-spinner {
            width: 45px; height: 45px;
            border: 4px solid rgba(130, 179, 251, 0.1);
            border-left-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Слой приветствия --- */
        .welcome-layer {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #e2eaf3;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .video-fallback {
            background-image: url("{% static 'feedback/admin_wall.png' %}") !important;
            background-size: cover;
            background-position: center;
        }

        .cta-btn {
            width: 100%;
            background: var(--accent-blue);
            border: 2px solid var(--dark);
            border-radius: 20px; 
            color: #FFFFFF;
            padding: 22px;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--dark);
            transition: all .15s ease;
            cursor: pointer;
        }

        /* --- Основная оболочка --- */
        .neo-shell {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 12px;
            min-height: calc(100vh - 24px);
        }

        .neo-topbar {
            background: var(--accent-light);
            border: 2px solid var(--dark);
            border-radius: 24px; 
            box-shadow: 6px 6px 0px rgba(0,0,0,0.05);
            padding: 15px 24px;
        }

        .neo-card {
            background: var(--accent-light);
            border: 2px solid var(--dark);
            border-radius: 30px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.03);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-width: 100%;
        }

        .neo-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 12px;
            min-height: 0;
        }

        /* --- ЧАТ ПАНЕЛЬ --- */
        .chat-shell { 
            position: relative; 
            background: #FFFFFF; 
            min-width: 0;
        }

        .chat-header {
            background: #FFFFFF;
            padding: 12px 20px;
            border-bottom: 2px solid var(--dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        #admin-chat-content {
            height: 500px; /* Фикс высота под wtf.png */
            overflow-y: auto;
            position: relative;
            z-index: 1;
            background-image: url("{% static 'feedback/wtf.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Исправление отображения сообщений */
            display: block; /* Убираем flex, чтобы сообщения не центрировались по вертикали всей панели */
            padding: 20px;

            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #admin-chat-content::-webkit-scrollbar { display: none; }

        #admin-chat-content::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.78); 
            backdrop-filter: blur(1px);
            z-index: -1;
        }

        /* Контейнер внутри скролла для правильного расположения сообщений */
        .chat-messages-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 100%;
            justify-content: flex-start; /* Всегда сверху вниз */
        }

        .chat-input-area {
            padding: 15px;
            border-top: 2px solid var(--dark);
            background: white;
            z-index: 10;
        }

        .chat-input-field {
            width: 100%;
            border: 2px solid var(--dark);
            border-radius: 15px;
            padding: 12px;
            font-weight: 600;
            color: var(--dark); 
            outline: none;
            font-size: 14px;
        }

        .send-btn {
            background-color: var(--ultramarine) !important;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            padding: 10px 20px;
            border: 2px solid var(--dark);
            border-radius: 15px;
            box-shadow: 4px 4px 0px var(--dark);
            font-size: 11px;
            transition: all 0.1s;
        }

        .send-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--dark);
        }

        /* Список тикетов */
        .tickets-list {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            max-height: 500px;
            scrollbar-width: none;
        }
        .tickets-list::-webkit-scrollbar { display: none; }

        .neo-ticket {
            border: 2px solid var(--dark);
            border-radius: 20px;
            background: #FFFFFF;
            padding: 15px;
            text-align: left;
            width: 100%;
            transition: all 0.2s;
        }

        .neo-ticket.active-ticket {
            border-color: var(--accent-blue);
            background: #f8fbff;
            box-shadow: 4px 4px 0px rgba(130, 179, 251, 0.3);
        }

        .hidden { display: none !important; }

        @media (max-width: 1024px) {
            .neo-layout { grid-template-columns: 1fr; }
            #admin-chat-content { height: 450px; }
            .tickets-list { max-height: 300px; }
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-spinner"></div>
        <p style="font-size: 8px; font-weight: bold; margin-top: 15px; text-transform: uppercase; letter-spacing: 2px; color: #82B3FB;">Yuklanmoqda...</p>
    </div>

    <section id="admin-welcome" class="welcome-layer">
        <div id="welcome-container" class="relative w-full h-full overflow-hidden flex flex-col justify-end bg-transparent">
            <video id="admin-welcome-video" class="absolute inset-0 w-full h-full object-cover opacity-90 z-0" muted playsinline poster="{% static 'feedback/admin_wall.png' %}"></video>
            <div id="video-overlay-text" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-white/35 backdrop-blur-[1px]">
                <h2 class="text-5xl font-black uppercase text-[#82B3FB] drop-shadow-md">Kawaii</h2>
                <p class="tracking-[0.5em] font-bold text-gray-500 mt-4 text-xs">SUPPORT SERVICE</p>
            </div>
            <div class="p-10 z-20 mx-auto w-full max-w-md">
                <button id="ganbatte-btn" class="cta-btn">Ganbatte</button>
            </div>
        </div>
    </section>

    <div id="admin-panel" class="neo-shell hidden">
        <header class="neo-topbar flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[9px] font-black text-blue-400 uppercase tracking-[0.3em] leading-none mb-1">Active</span>
                <h1 class="text-lg font-black leading-none">Admin: {{ staff_user.username }}</h1>
            </div>
        </header>

        <main class="neo-layout">
            <section class="neo-card chat-shell">
                <div class="chat-header">
                    <span class="font-black text-[9px] tracking-widest text-gray-400">TERMINAL // SESSION</span>
                    <div class="flex gap-2">
                        <div class="w-2 h-2 rounded-full bg-yellow-400 border border-black"></div>
                        <div class="w-2 h-2 rounded-full bg-red-400 border border-black"></div>
                    </div>
                </div>
                
                <div id="admin-chat-content">
                    <div class="chat-messages-wrapper">
                        <div class="h-full flex flex-col items-center justify-center opacity-10 py-32">
                            <h2 class="text-4xl font-black italic"></h2>
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <div class="flex gap-3">
                        {% csrf_token %}
                        <input type="hidden" id="admin-user-id" value="{{ user_id }}">
                        <input type="text" id="admin-reply-input" class="chat-input-field" placeholder="Xabar...">
                        <button id="admin-send-btn" class="send-btn">Yuborish</button>
                    </div>
                </div>
            </section>

            <aside class="neo-card">
                <div class="p-4 border-b-2 border-dark bg-white">
                    <h2 class="font-black uppercase text-[10px] tracking-widest">Murojaatlar</h2>
                </div>
                <div class="tickets-list">
                    {% for ticket in tickets %}
                    <button data-ticket-id="{{ ticket.id }}"
                        hx-get="{% url 'feedback:admin_ticket_chat' ticket.id %}?user_id={{ user_id }}"
                        hx-target="#admin-chat-content .chat-messages-wrapper"
                        hx-swap="innerHTML"
                        class="neo-ticket admin-ticket-item">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[8px] font-black opacity-30">#{{ ticket.id }}</span>
                            <div class="ticket-status-dot w-2 h-2 {% if ticket.is_closed %}bg-gray-400{% else %}bg-[#5EEA7E]{% endif %} rounded-full border border-black"></div>
                        </div>
                        <h3 class="font-black text-xs truncate">{{ ticket.subject }}</h3>
                        <p class="text-[9px] font-bold text-blue-400">@{{ ticket.username }}</p>
                    </button>
                    {% endfor %}
                </div>
            </aside>
        </main>
    </div>

    <script>
        const preloader = document.getElementById('preloader');
        const welcomeScreen = document.getElementById('admin-welcome');
        const adminPanel = document.getElementById('admin-panel');
        const enterButton = document.getElementById('ganbatte-btn');
        const welcomeVideo = document.getElementById('admin-welcome-video');
        const replyInput = document.getElementById('admin-reply-input');
        const sendButton = document.getElementById('admin-send-btn');
        
        const videoSrc = "{% static 'feedback/hello_admin_2.mp4' %}";
        const closeUrlTemplate = "{% url 'feedback:admin_close_ticket' 999999 %}";

        function hidePreloader() {
            if (preloader) {
                preloader.style.opacity = '0';
                setTimeout(() => preloader.classList.add('hidden'), 500);
            }
        }

        if (welcomeVideo) {
            welcomeVideo.src = videoSrc;
            welcomeVideo.onplaying = hidePreloader;
            welcomeVideo.onerror = hidePreloader;
            welcomeVideo.play().catch(hidePreloader);
        }

        enterButton.addEventListener('click', () => {
            welcomeScreen.classList.add('hidden');
            adminPanel.classList.remove('hidden');
            syncActiveTicketFromChat();
            setTimeout(scrollChatToBottom, 100);
        });

        function syncActiveTicketFromChat() {
            const wrapper = document.querySelector('#admin-chat-content [data-selected-ticket-id]');
            const activeId = wrapper?.dataset?.selectedTicketId || '';
            const isClosed = wrapper?.dataset?.ticketClosed === 'true';
            const closeButton = document.getElementById('admin-close-btn');
            
            if (sendButton) {
                sendButton.disabled = !activeId || isClosed;
                sendButton.style.opacity = (!activeId || isClosed) ? '0.5' : '1';
            }

            if (closeButton) {
                closeButton.disabled = !activeId || isClosed;
                closeButton.style.opacity = (!activeId || isClosed) ? '0.6' : '1';
                closeButton.style.cursor = (!activeId || isClosed) ? 'not-allowed' : 'pointer';
            }


            document.querySelectorAll('.admin-ticket-item').forEach((btn) => {
                btn.classList.toggle('active-ticket', activeId && btn.dataset.ticketId === activeId);
            });

            if (activeId) {
                const activeTicketBtn = document.querySelector(`.admin-ticket-item[data-ticket-id="${activeId}"]`);
                const statusDot = activeTicketBtn?.querySelector('.ticket-status-dot');
                if (statusDot) {
                    statusDot.classList.toggle('bg-gray-400', isClosed);
                    statusDot.classList.toggle('bg-[#5EEA7E]', !isClosed);
                }
            }

        }

        function scrollChatToBottom() {
            const el = document.getElementById('admin-chat-content');
            if (el) el.scrollTop = el.scrollHeight;
        }

        function sendAdminReply() {
            const message = (replyInput?.value || '').trim();
            const wrapper = document.querySelector('#admin-chat-content [data-selected-ticket-id]');
            const activeId = wrapper?.dataset?.selectedTicketId;
            if (!activeId || !message) return;

            const replyUrl = replyUrlTemplate.replace('999999', activeId);
            const userId = document.getElementById('admin-user-id')?.value;
            const csrf = document.querySelector('input[name=csrfmiddlewaretoken]')?.value;

            htmx.ajax('POST', replyUrl, {
                target: '#admin-chat-content .chat-messages-wrapper',
                swap: 'innerHTML',
                values: { user_id: userId, reply_text: message },
                headers: csrf ? { 'X-CSRFToken': csrf } : {},
            });

            replyInput.value = '';
            replyInput.focus();
        }

        function closeActiveTicket() {
            const wrapper = document.querySelector('#admin-chat-content [data-selected-ticket-id]');
            const activeId = wrapper?.dataset?.selectedTicketId;
            const isClosed = wrapper?.dataset?.ticketClosed === 'true';
            if (!activeId || isClosed) return;

            const closeUrl = closeUrlTemplate.replace('999999', activeId);
            const csrf = document.querySelector('input[name=csrfmiddlewaretoken]')?.value;

            htmx.ajax('POST', closeUrl, {
                target: '#admin-chat-content .chat-messages-wrapper',
                swap: 'innerHTML',
                headers: csrf ? { 'X-CSRFToken': csrf } : {},
            });
        }


        sendButton?.addEventListener('click', sendAdminReply);
        replyInput?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAdminReply(); }
        });

        document.body.addEventListener('htmx:afterSwap', (e) => {
            // Если обновилось содержимое чата
            if (e.target.closest('.chat-messages-wrapper')) {
                syncActiveTicketFromChat();
                scrollChatToBottom();
            }
        });

        document.body.addEventListener('click', (e) => {
            const closeBtn = e.target.closest('#admin-close-btn');
            if (!closeBtn || closeBtn.disabled) return;
            closeActiveTicket();
        });

    </script>
</body>
</html>
