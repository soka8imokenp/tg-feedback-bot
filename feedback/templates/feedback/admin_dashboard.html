{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&display=swap" rel="stylesheet">
    <title>Soft Retro Admin</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-main: #F4F9FF;       
            --accent-blue: #82B3FB;   /* Тот самый голубой */
            --ultramarine: #120AFF;   /* Синий Ультрамарин */
            --accent-light: #FFFFFF;  
            --dark: #1A1A1B;          /* Чуть мягче чем чистый черный */
        }

        body {
            font-family: 'Unbounded', sans-serif;
            background-color: var(--bg-main);
            color: var(--dark);
            margin: 0;
            padding: 12px;
            letter-spacing: -0.02em;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        /* --- Слой приветствия --- */
        .welcome-layer {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .cta-btn {
            width: 100%;
            background: var(--accent-blue);
            border: 2px solid var(--dark);
            border-radius: 20px; /* Мягкое скругление */
            color: #FFFFFF;
            padding: 22px;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--dark);
            transition: all .15s ease;
            cursor: pointer;
        }

        .cta-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--dark);
        }

        /* --- Основная оболочка --- */
        .neo-shell {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 12px;
            min-height: calc(100vh - 24px);
        }

        .neo-topbar {
            background: var(--accent-light);
            border: 2px solid var(--dark);
            border-radius: 24px; /* Очень мягкие углы */
            box-shadow: 6px 6px 0px rgba(0,0,0,0.05);
            padding: 25px;
        }

        .neo-card {
            background: var(--accent-light);
            border: 2px solid var(--dark);
            border-radius: 30px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.03);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .neo-layout {
            display: grid;
            grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
            gap: 12px;
            min-height: 0;
        }

        /* --- Список тикетов --- */
        .tickets-list {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
        }

        .neo-ticket {
            border: 2px solid var(--dark);
            border-radius: 20px;
            background: #FFFFFF;
            padding: 20px;
            transition: all 0.2s ease;
            cursor: pointer;
            text-align: left;
        }

        .neo-ticket:hover {
            border-color: var(--accent-blue);
            transform: translateY(-3px);
            box-shadow: 0px 10px 20px rgba(130, 179, 251, 0.2);
        }

        /* --- Чат и Терминал --- */
        .chat-shell {
            position: relative;
            background: #FFFFFF;
        }

        .chat-header {
            background: #FFFFFF;
            padding: 15px 25px;
            border-bottom: 2px solid var(--dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Стили сообщений в чате */
        .admin-msg-bubble {
            background-color: var(--accent-blue) !important; /* Голубой для админа */
            color: white !important;
            border-radius: 18px 18px 4px 18px;
            border: 2px solid var(--dark);
            padding: 12px 18px;
            align-self: flex-end;
            box-shadow: 3px 3px 0px var(--dark);
        }

        /* Поле ввода и текст печати */
        .chat-input-area {
            padding: 20px;
            border-top: 2px solid var(--dark);
            background: white;
        }

        .chat-input-field {
            width: 100%;
            border: 2px solid var(--dark);
            border-radius: 15px;
            padding: 15px;
            font-weight: 600;
            color: var(--accent-blue) !important; /* Цвет печатаемого текста — голубой */
            outline: none;
        }

        /* Кнопка отправки Ультрамарин */
        .send-btn {
            background-color: var(--ultramarine) !important;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            padding: 12px 25px;
            border: 2px solid var(--dark);
            border-radius: 15px;
            box-shadow: 4px 4px 0px var(--dark);
            transition: all 0.1s;
        }

        .send-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--dark);
        }

        .hidden { display: none !important; }

        /* Красивый скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 10px; }

        @media (max-width: 1024px) {
            body { padding: 10px; }
            .neo-shell { min-height: calc(100vh - 20px); }
            .neo-layout { grid-template-columns: 1fr; }
            .neo-topbar {
                padding: 16px;
                flex-wrap: wrap;
                gap: 10px;
            }
            .tickets-list { max-height: 42vh; }
            #admin-chat-content { padding: 16px !important; }
        }

        @media (max-width: 640px) {
            .chat-header { padding: 12px; }
            .chat-input-area { padding: 12px; }
            .chat-input-area .flex { gap: 8px; }
            .send-btn { padding: 10px 14px; font-size: 10px; }
            .cta-btn { padding: 16px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <section id="admin-welcome" class="welcome-layer">
        <div class="relative w-full h-full overflow-hidden flex flex-col justify-end bg-white">
            <video id="admin-welcome-video" class="absolute inset-0 w-full h-full object-cover opacity-90 z-0" autoplay muted playsinline loop preload="auto"></video>
            <div id="video-overlay-text" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-white/35 backdrop-blur-[1px]">
                <h2 class="text-5xl sm:text-7xl font-black uppercase text-[#82B3FB] drop-shadow-md text-center px-3">Kawaii</h2>
                <p class="tracking-[0.35em] sm:tracking-[0.5em] font-bold text-gray-500 mt-4 text-xs sm:text-sm text-center px-3">SUPPORT SERVICE</p>
            </div>
            <div class="p-6 sm:p-10 z-20 pb-10 sm:pb-16 mx-auto w-full max-w-md">
                <button id="ganbatte-btn" class="cta-btn">Ganbatte</button>
            </div>
        </div>
    </section>

    <div id="admin-panel" class="neo-shell hidden">
        <header class="neo-topbar flex justify-between items-center">
            <div>
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-[0.3em]">System Active</span>
                <h1 class="text-2xl font-black">Admin: {{ staff_user.username }}</h1>
            </div>
            <div class="flex gap-4">
                <div class="px-6 py-2 border-2 border-dark rounded-full font-black text-sm">Tickets: {{ tickets|length }}</div>
                <div class="px-6 py-2 bg-red-50 border-2 border-red-500 text-red-500 rounded-full font-black text-sm animate-pulse">LIVE FEED</div>
            </div>
        </header>

        <main class="neo-layout">
            <aside class="neo-card">
                <div class="p-6 border-b-2 border-dark bg-white">
                    <h2 class="font-black uppercase text-sm tracking-widest">Messages</h2>
                </div>
                <div class="tickets-list">
                    {% for ticket in tickets %}
                    <button hx-get="{% url 'feedback:admin_ticket_chat' ticket.id %}?user_id={{ user_id }}" 
                            hx-target="#admin-chat-content" 
                            class="neo-ticket">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-black opacity-30">#{{ ticket.id }}</span>
                            <div class="w-2.5 h-2.5 bg-[#5EEA7E] rounded-full border border-black"></div>
                        </div>
                        <h3 class="font-black text-sm">{{ ticket.subject|truncatechars:35 }}</h3>
                        <p class="text-[10px] font-bold mt-2 text-blue-400">@{{ ticket.username }}</p>
                    </button>
                    {% endfor %}
                </div>
            </aside>

            <section class="neo-card chat-shell">
                <div class="chat-header">
                    <span class="font-black text-[11px] tracking-widest text-gray-400">TERMINAL_MODE // SESSION_ACTIVE</span>
                    <div class="flex gap-2">
                        <div class="w-3 h-3 rounded-full bg-yellow-400 border border-black"></div>
                        <div class="w-3 h-3 rounded-full bg-red-400 border border-black"></div>
                    </div>
                </div>
                
                <div id="admin-chat-content" class="flex-grow overflow-y-auto p-10 flex flex-col gap-4">
                    {% if not selected_ticket %}
                    <div class="h-full flex flex-col items-center justify-center opacity-10">
                        <h2 class="text-5xl font-black italic">Kawaii OS</h2>
                    </div>
                    {% endif %}
                </div>

                <div class="chat-input-area">
                    <div class="flex gap-4">
                        <input type="text" class="chat-input-field" placeholder="Введите сообщение...">
                        <button class="send-btn">Javob yuborish</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const welcomeScreen = document.getElementById('admin-welcome');
        const adminPanel = document.getElementById('admin-panel');
        const enterButton = document.getElementById('ganbatte-btn');
        const welcomeVideo = document.getElementById('admin-welcome-video');
        const videoOverlayText = document.getElementById('video-overlay-text');

        const videoSrc = "{% static 'feedback/hello_admin_2.mp4' %}";

        if (welcomeVideo) {
            welcomeVideo.src = videoSrc;
            welcomeVideo.addEventListener('error', () => {
                welcomeVideo.classList.add('hidden');
            });
            welcomeVideo.play().catch(() => {
                welcomeVideo.classList.add('hidden');
            });
        }

        enterButton.addEventListener('click', () => {
            welcomeScreen.classList.add('hidden');
            adminPanel.classList.remove('hidden');
        });
    </script>
</body>
</html>
