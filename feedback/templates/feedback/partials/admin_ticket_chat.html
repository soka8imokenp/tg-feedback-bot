{% if selected_ticket %}
<div class="h-full flex flex-col" data-selected-ticket-id="{{ selected_ticket.id }}" data-ticket-closed="{{ selected_ticket.is_closed|yesno:'true,false' }}">
    <div class="pb-3 border-b border-black/10 mb-3">
        <p class="text-xs text-black/60">Ticket #{{ selected_ticket.id }} · @{{ selected_ticket.username }}</p>
        <h2 class="text-lg font-bold text-black">{{ selected_ticket.subject }}</h2>    
    </div>

    <div id="ticket-messages-scroll" class="flex-1 space-y-3 overflow-y-auto pr-1 mb-1">
        {% for msg in messages %}
            <div class="flex {% if msg.is_from_admin %}justify-end{% else %}justify-start{% endif %}">
                <div class="max-w-[88%] px-3 py-2 rounded-xl text-sm border {% if msg.is_from_admin %}bg-[#82B3FB] text-white border-black{% else %}bg-white text-black border-black/20{% endif %}">
                    <p class="whitespace-pre-wrap break-words">{{ msg.text }}</p>
                    <p class="text-[10px] mt-1 {% if msg.is_from_admin %}text-white/80{% else %}text-black/40{% endif %}">{{ msg.time }}</p>
                </div>
            </div>
        {% empty %}
            <p class="text-sm text-black/40">Xabarlar hali yo'q.</p>
        {% endfor %}
    </div>
    {% else %}
<div class="h-full flex items-center justify-center text-black/40" data-selected-ticket-id="">
    Ticket tanlang.
</div>
{% endif %}
